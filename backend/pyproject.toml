[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "RUF"  # Ruff-specific rules
]
ignore = [
    "E501", # Line length is handled by formatter, ignore warning checks
    "B008", # Allow function calls (Depends) in argument defaults for FastAPI
    "UP042", # Allow str + Enum inheritance for roles model compatibility
    "UP046"  # Allow Generic[T] subclassing declarations instead of newer PEP 695
]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_configs = true
ignore_missing_imports = true
warn_unused_ignores = false
exclude = ["venv", ".venv"]
plugins = []
